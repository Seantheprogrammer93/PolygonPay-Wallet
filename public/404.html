<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | PolygonPay</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .not-found {
      text-align: center;
      padding: 3rem 1rem;
    }

    .not-found h2 {
      font-size: 4rem;
      color: #7b3fe4;
      margin-bottom: 0.5rem;
    }

    .not-found p {
      color: #888;
      margin-bottom: 1.5rem;
    }

    .not-found a {
      color: #4a9eff;
      text-decoration: none;
    }

    .not-found a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card not-found" role="main">
    <h2>404</h2>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">&#8592; Back to PolygonPay</a>
  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolygonPay Wallet</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.16.0/dist/ethers.umd.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="card" role="main">
    <h1>PolygonPay Wallet</h1>
    <p class="disclaimer">Note: PolygonPay is a non-custodial cryptocurrency wallet. <u>You are responsible for keeping your private key safe!</u> <a href="https://ethereum.org/en/wallets/" target="_blank" rel="noopener noreferrer" style="color:#4a9eff;cursor:help;" aria-label="Learn more about keeping your private key safe (opens in a new tab)">Learn more <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:middle;" aria-hidden="true" focusable="false"><path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/><path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/></svg></a></p>

    <button id="btn" onclick="generate()">Generate Wallet</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)"
      aria-label="Select a wallet JSON file to import" />
    <button class="btn-import" onclick="document.getElementById('importFile').click()" style="margin-top:0.6rem;"
      aria-label="Import wallet from JSON file"><span aria-hidden="true">&#8593;</span> Import from .json</button>
    <p class="error" id="error" role="alert" aria-live="assertive" aria-atomic="true"></p>
    <p class="error" id="import-error" role="alert" aria-live="assertive" aria-atomic="true"></p>

    <div class="wallets-section" id="wallets-section" style="display:none" role="region" aria-label="Saved wallets">
      <div class="wallets-header">
        <span>Saved Wallets</span>
        <span class="wallets-count" id="wallets-count" aria-live="polite"></span>
      </div>
      <ul class="wallets-list" id="wallets-list"></ul>
    </div>

    <div class="result" id="result" role="region" aria-label="Generated wallet keypair">
      <div class="field">
        <label id="label-address">Ethereum Address (Public)</label>
        <div class="value" id="address" role="button" tabindex="0" onclick="copy('address')" title="Click to copy"
          aria-labelledby="label-address" aria-describedby="hint-address"></div>
        <p class="copy-hint" id="hint-address" aria-hidden="true">Click to copy</p>
      </div>
      <div class="field">
        <label id="label-privatekey">Private Key</label>
        <div class="value" id="privateKey" role="button" tabindex="0" onclick="copy('privateKey')" title="Click to copy"
          aria-labelledby="label-privatekey" aria-describedby="hint-privatekey"></div>
        <p class="copy-hint" id="hint-privatekey" aria-hidden="true">Click to copy</p>
      </div>
      <div class="warning">
        <span aria-hidden="true">&#9888;</span> Never share your private key with anyone.
      </div>
      <button class="btn-download" onclick="downloadJson()" aria-label="Download wallet keypair as JSON file"><span
          aria-hidden="true">&#8595;</span> Download as .json</button>
    </div>
  </div>

  <script>
    let db = null;

    function generate() {
      const btn = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      errorEl.style.display = 'none';

      try {
        const wallet = ethers.Wallet.createRandom();
        document.getElementById('address').textContent = wallet.address;
        document.getElementById('privateKey').textContent = wallet.privateKey;
        document.getElementById('result').style.display = 'block';
        saveWalletToDB(wallet.address, wallet.privateKey).then(() => renderWallets());
      } catch (e) {
        errorEl.textContent = 'Failed to generate keypair.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Wallet';
      }
    }

    function downloadJson() {
      const address = document.getElementById('address').textContent;
      const privateKey = document.getElementById('privateKey').textContent;
      const content = JSON.stringify({ address, privateKey, warning: 'Never share your private key with anyone.' }, null, 2);
      const blob = new Blob([content], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ethereum-keypair.json';
      // Appending to body is required for Safari iOS — programmatic clicks on
      // detached elements are silently ignored on that platform.
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function handleImport(event) {
      const file = event.target.files[0];
      const importErrorEl = document.getElementById('import-error');
      const errorEl = document.getElementById('error');
      importErrorEl.style.display = 'none';
      errorEl.style.display = 'none';

      if (!file) return;

      // Reset so the same file can be re-imported if needed
      event.target.value = '';

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = JSON.parse(e.target.result);
          if (typeof data.address !== 'string' || typeof data.privateKey !== 'string') {
            throw new Error('Missing address or privateKey fields.');
          }
          // Validate via ethers: reconstruct wallet from private key and verify address matches
          const wallet = new ethers.Wallet(data.privateKey);
          if (wallet.address.toLowerCase() !== data.address.toLowerCase()) {
            throw new Error('Private key does not match the address in this file.');
          }
          document.getElementById('address').textContent = wallet.address;
          document.getElementById('privateKey').textContent = wallet.privateKey;
          document.getElementById('result').style.display = 'block';
          walletExistsByAddress(wallet.address).then(exists => {
            if (!exists) saveWalletToDB(wallet.address, wallet.privateKey).then(() => renderWallets());
          });
        } catch (err) {
          importErrorEl.textContent = 'Import failed: ' + (err.message || 'Invalid wallet file.');
          importErrorEl.style.display = 'block';
        }
      };
      reader.onerror = function () {
        importErrorEl.textContent = 'Import failed: Could not read file.';
        importErrorEl.style.display = 'block';
      };
      reader.readAsText(file);
    }

    // ── IndexedDB wallet storage ────────────────────────────────────────
    function initDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('polygonpay', 1);
        req.onupgradeneeded = function (e) {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('wallets')) {
            d.createObjectStore('wallets', { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = function (e) { db = e.target.result; resolve(); };
        req.onerror = function () { reject(req.error); };
      });
    }

    function saveWalletToDB(address, privateKey) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('wallets', 'readwrite');
        const req = tx.objectStore('wallets').add({ address, privateKey, createdAt: new Date().toISOString() });
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function getAllWallets() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('wallets', 'readonly');
        const req = tx.objectStore('wallets').getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function deleteWalletFromDB(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('wallets', 'readwrite');
        const req = tx.objectStore('wallets').delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function walletExistsByAddress(address) {
      return getAllWallets().then(wallets =>
        wallets.some(w => w.address.toLowerCase() === address.toLowerCase())
      );
    }

    function renderWallets() {
      if (!db) return;
      getAllWallets().then(wallets => {
        const section = document.getElementById('wallets-section');
        const list = document.getElementById('wallets-list');
        const countEl = document.getElementById('wallets-count');
        if (wallets.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        countEl.textContent = wallets.length + ' wallet' + (wallets.length !== 1 ? 's' : '');
        list.innerHTML = '';
        [...wallets].reverse().forEach(wallet => {
          const li = document.createElement('li');
          li.className = 'wallet-entry';
          const short = wallet.address.slice(0, 10) + '\u2026' + wallet.address.slice(-8);
          const dateStr = new Date(wallet.createdAt).toLocaleString();
          const info = document.createElement('div');
          info.className = 'wallet-entry-info';
          const addrSpan = document.createElement('span');
          addrSpan.className = 'wallet-entry-addr';
          addrSpan.title = wallet.address;
          addrSpan.textContent = short;
          const dateSpan = document.createElement('span');
          dateSpan.className = 'wallet-entry-date';
          dateSpan.textContent = dateStr;
          info.appendChild(addrSpan);
          info.appendChild(dateSpan);
          const actions = document.createElement('div');
          actions.className = 'wallet-entry-actions';
          const loadBtn = document.createElement('button');
          loadBtn.className = 'btn-sm btn-load-wallet';
          loadBtn.textContent = 'Load';
          loadBtn.setAttribute('aria-label', 'Load wallet ' + wallet.address);
          loadBtn.onclick = () => loadSavedWallet(wallet.id);
          const delBtn = document.createElement('button');
          delBtn.className = 'btn-sm btn-delete-wallet';
          delBtn.textContent = 'Delete';
          delBtn.setAttribute('aria-label', 'Delete wallet ' + wallet.address);
          delBtn.onclick = () => deleteSavedWallet(wallet.id);
          actions.appendChild(loadBtn);
          actions.appendChild(delBtn);
          li.appendChild(info);
          li.appendChild(actions);
          list.appendChild(li);
        });
      });
    }

    function loadSavedWallet(id) {
      getAllWallets().then(wallets => {
        const wallet = wallets.find(w => w.id === id);
        if (!wallet) return;
        document.getElementById('address').textContent = wallet.address;
        document.getElementById('privateKey').textContent = wallet.privateKey;
        document.getElementById('result').style.display = 'block';
        document.getElementById('error').style.display = 'none';
        document.getElementById('import-error').style.display = 'none';
      });
    }

    function deleteSavedWallet(id) {
      deleteWalletFromDB(id).then(() => renderWallets());
    }
    // ─────────────────────────────────────────────────────────────────────

    function copy(id) {
      const text = document.getElementById(id).textContent;
      const el = document.getElementById(id);
      const orig = el.textContent;

      function showCopied() {
        el.textContent = 'Copied!';
        setTimeout(() => el.textContent = orig, 1200);
      }

      // navigator.clipboard requires a secure context (HTTPS). Fall back to
      // the legacy execCommand approach for plain HTTP environments.
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy(text, showCopied));
      } else {
        fallbackCopy(text, showCopied);
      }
    }

    function fallbackCopy(text, onSuccess) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        if (document.execCommand('copy')) onSuccess();
      } finally {
        document.body.removeChild(ta);
      }
    }

    initDB().then(() => renderWallets()).catch(() => {
      // IndexedDB is unavailable — most commonly in Safari private browsing mode.
      // The app remains fully functional; wallets just won't be persisted.
      const notice = document.createElement('p');
      notice.textContent = 'Note: Wallet storage is unavailable in private browsing mode. Generated wallets will not be saved.';
      notice.style.cssText = 'margin-top:0.75rem;font-size:0.78rem;color:#f0a040;';
      document.querySelector('.card').appendChild(notice);
    });
  </script>
</body>

</html>
